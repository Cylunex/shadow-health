<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>网络不可用 · shadow-health</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 320px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(30, 41, 59, 0.9);
      border-radius: 20px;
      padding: 40px 28px 32px;
      background: linear-gradient(180deg, rgba(30, 41, 59, 0.55), rgba(15, 23, 42, 0.4));
    }
    .icon {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      display: block;
      filter: drop-shadow(0 0 18px rgba(52, 211, 153, 0.25));
    }
    h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 8px; }
    p { font-size: 13px; line-height: 1.7; color: #94a3b8; margin-bottom: 24px; }
    button {
      appearance: none;
      border: none;
      cursor: pointer;
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      color: #052e22;
      background: linear-gradient(90deg, #34d399, #2dd4bf);
      box-shadow: 0 0 18px rgba(52, 211, 153, 0.35);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    button:active { opacity: 0.85; transform: scale(0.98); }
    .hint { margin-top: 16px; font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <main class="card">
    <svg class="icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="100" height="100" rx="22" fill="#0f172a"/>
      <path d="M50 78 C30 62 18 50 18 37 A14 14 0 0 1 50 28 A14 14 0 0 1 82 37 C82 50 70 62 50 78 Z"
            fill="none" stroke="#34d399" stroke-width="6" stroke-linejoin="round"/>
      <polyline points="26,52 38,52 44,40 52,62 58,48 74,48" fill="none" stroke="#34d399"
                stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>网络不可用</h1>
    <p>当前无法连接到 shadow-health 服务器。<br>请确认已接入家庭局域网后重试。</p>
    <button type="button" onclick="location.reload()">重新加载</button>
    <div class="hint">网络恢复后将自动重试</div>
  </main>
  <script>
    window.addEventListener('online', function () { location.reload(); });
  </script>
</body>
</html>
