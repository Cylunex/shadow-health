{# streak/今日完成率汇总条：容器用 hx-trigger="load, habit-changed from:body" 被动刷新（今日页嵌在卡片内，此处保持紧凑面板） #}
<div id="habits-summary" class="rounded-xl border border-slate-800/70 bg-slate-900/60 px-3.5 py-3 fade-in">
  <div class="flex items-end justify-between gap-3">
    <div>
      <div class="text-xs text-slate-400 mb-0.5">今日打卡</div>
      <div class="flex items-baseline gap-1">
        <span class="stat-num">{{ daily_done }}</span>
        <span class="text-sm text-slate-500 tabular-nums">/ {{ daily_total }}</span>
      </div>
    </div>
    <div class="flex flex-col items-end gap-1.5 pb-0.5">
      {% if weekly_total %}<span class="badge tabular-nums">本周 {{ weekly_done }}/{{ weekly_total }} 项</span>{% endif %}
      {% if best_streak > 0 %}
      <span class="badge gap-1 text-amber-300 border-amber-800/60 bg-amber-950/40 tabular-nums">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-3 h-3">
          <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
        </svg>连续 {{ best_streak }} 天
      </span>
      {% endif %}
    </div>
  </div>
  <div class="mt-3 progress-track">
    <div class="progress-fill" style="width: {{ pct }}%"></div>
  </div>
</div>
