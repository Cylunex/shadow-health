{# 今日三环片段（步数/训练分钟/打卡完成）：外层卡片由 today.html 提供；
   habit-changed / workout-changed 被动刷新 #}
<div class="grid grid-cols-3 gap-2">
  {% for r in rings %}
  <div class="flex flex-col items-center gap-1.5">
    <div class="relative w-20 h-20">
      <svg viewBox="0 0 36 36" class="w-20 h-20 -rotate-90">
        <circle cx="18" cy="18" r="15.5" fill="none" stroke="rgba(51,65,85,0.45)" stroke-width="3.6"/>
        <circle cx="18" cy="18" r="15.5" fill="none" stroke="{{ r.color }}" stroke-width="3.6"
                stroke-linecap="round" pathLength="100"
                stroke-dasharray="{{ r.pct }} 100"
                {% if r.pct >= 100 %}style="filter: drop-shadow(0 0 4px {{ r.color }})"{% endif %}/>
      </svg>
      <div class="absolute inset-0 flex flex-col items-center justify-center leading-none">
        <span class="text-sm font-bold tabular-nums text-slate-100">{{ r.value }}</span>
        <span class="mt-0.5 text-[10px] text-slate-500">{{ r.label }}</span>
      </div>
    </div>
    <span class="text-[10px] text-slate-500 tabular-nums">{{ r.sub }}</span>
  </div>
  {% endfor %}
</div>
{% if rings[0].pct >= 100 and rings[1].pct >= 100 and rings[2].pct >= 100 %}
<p class="mt-3 text-center text-xs"><span class="badge-accent">三环合围，今日圆满 🎉</span></p>
{% endif %}
