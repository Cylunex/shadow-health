{# 食物行内编辑：PUT 成功回 food_row，取消回 row 片段 #}
<li id="food-{{ food.id }}" class="rounded-xl border border-emerald-700/50 bg-slate-900/70 px-3.5 py-3">
  <form hx-put="/diet/foods/{{ food.id }}"
        hx-target="#food-{{ food.id }}" hx-swap="outerHTML"
        class="space-y-2.5">
    {% if error %}
    <div class="rounded-lg bg-red-600/15 border border-red-600/40 text-red-400 text-xs px-3 py-2">{{ error }}</div>
    {% endif %}
    <div class="grid grid-cols-2 gap-2">
      <label class="block col-span-2 sm:col-span-1">
        <span class="field-label">名称 *</span>
        <input type="text" name="name" value="{{ food.name }}" maxlength="50" class="field">
      </label>
      <label class="block col-span-2 sm:col-span-1">
        <span class="field-label">分类</span>
        <input type="text" name="category" value="{{ food.category or '' }}" maxlength="20" class="field">
      </label>
      <label class="block">
        <span class="field-label">热量 (kcal/100g)</span>
        <input type="text" inputmode="decimal" name="kcal_per_100g" value="{{ fmt(food.kcal_per_100g) }}" class="field tabular-nums">
      </label>
      <label class="block">
        <span class="field-label">蛋白质 (g/100g)</span>
        <input type="text" inputmode="decimal" name="protein_g" value="{{ fmt(food.protein_g) }}" class="field tabular-nums">
      </label>
      <label class="block">
        <span class="field-label">脂肪 (g/100g)</span>
        <input type="text" inputmode="decimal" name="fat_g" value="{{ fmt(food.fat_g) }}" class="field tabular-nums">
      </label>
      <label class="block">
        <span class="field-label">碳水 (g/100g)</span>
        <input type="text" inputmode="decimal" name="carb_g" value="{{ fmt(food.carb_g) }}" class="field tabular-nums">
      </label>
    </div>
    <div class="flex gap-2">
      <button type="submit" class="btn-primary flex-1 min-h-[44px]">保存</button>
      <button type="button" class="chip min-h-[44px] px-4"
              hx-get="/diet/foods/{{ food.id }}/row"
              hx-target="#food-{{ food.id }}" hx-swap="outerHTML">取消</button>
    </div>
  </form>
</li>
