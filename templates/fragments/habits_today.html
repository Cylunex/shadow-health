{# 今日打卡列表片段：今日面板 hx-get="/fragments/habits/today" 加载。ctx = items[{habit, st}] #}
<ul id="habits-today-list" class="space-y-2">
  {% for it in items %}
  {% with habit=it.habit, st=it.st %}{% include "fragments/habits_today_item.html" %}{% endwith %}
  {% else %}
  <li class="flex flex-col items-center gap-2 rounded-xl border border-dashed border-slate-800 bg-slate-900/40 px-4 py-6 text-center">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-7 h-7 text-slate-700">
      <path d="M7 20h10"/><path d="M10 20c5.5-2.5.8-6.4 3-10"/>
      <path d="M9.5 9.4c1.1.8 1.8 2.2 2.3 3.7-2 .4-3.5.4-4.8-.3-1.2-.6-2.3-1.9-3-4.2 2.8-.5 4.4 0 5.5.8z"/>
      <path d="M14.1 6a7 7 0 0 0-1.1 4c1.9-.1 3.3-.6 4.3-1.4 1-1 1.6-2.3 1.7-4.6-2.7.1-4 1-4.9 2z"/>
    </svg>
    <span class="text-sm text-slate-500">暂无启用的习惯，去 <a href="/habits" class="text-emerald-400 underline min-h-[44px] inline-flex items-center">养生打卡</a> 启用</span>
  </li>
  {% endfor %}
</ul>
