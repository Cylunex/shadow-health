<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 · shadow-health</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="text-slate-100 min-h-screen flex items-center justify-center px-6 py-10 antialiased">
  <form method="post" action="/login" class="card w-full max-w-sm p-6 space-y-5 fade-in">
    <div class="flex flex-col items-center gap-3 pt-2">
      <img src="/static/icon.svg" alt="shadow-health" class="w-14 h-14 drop-shadow-[0_0_18px_rgba(52,211,153,0.35)]">
      <div class="text-center">
        <h1 class="text-xl font-bold tracking-wide">shadow-health</h1>
        <p class="mt-1 text-xs text-slate-500">私人健康管理面板</p>
      </div>
    </div>
    {% if error %}
    <p class="flex items-center justify-center gap-1.5 text-sm text-red-400">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 shrink-0">
        <path d="M12 8v4M12 16h.01M12 21a9 9 0 1 0 0-18 9 9 0 0 0 0 18Z"/>
      </svg>
      {{ error }}
    </p>
    {% endif %}
    <div>
      <label class="field-label">访问密码</label>
      <input type="password" name="password" placeholder="密码" autofocus required class="field">
    </div>
    <button type="submit" class="btn-primary w-full">登录</button>
  </form>
</body>
</html>
