{% extends "base.html" %}
{% block page_title %}训练计时器{% endblock %}
{% block content %}
{# 纯前端计时器：动作/休息交替 × 组数；相位切换蜂鸣（WebAudio）；运行时申请屏幕常亮。
   预设：HIIT 40/20×8 · Tabata 20/10×8 · 力量组间（纯休息 90s，手动开下一组） #}
<div class="space-y-5"
     x-data="workoutTimer()"
     x-init="init()"
     @keydown.space.window.prevent="running ? pause() : start()">

  <section class="card" x-show="phase === 'idle'">
    <h2 class="card-title">设置</h2>
    <div class="grid grid-cols-3 gap-3">
      <label class="block">
        <span class="field-label">动作 (秒)</span>
        <input type="number" inputmode="numeric" min="0" max="3600" x-model.number="cfg.work" class="field tabular-nums">
      </label>
      <label class="block">
        <span class="field-label">休息 (秒)</span>
        <input type="number" inputmode="numeric" min="0" max="3600" x-model.number="cfg.rest" class="field tabular-nums">
      </label>
      <label class="block">
        <span class="field-label">组数</span>
        <input type="number" inputmode="numeric" min="1" max="99" x-model.number="cfg.rounds" class="field tabular-nums">
      </label>
    </div>
    <div class="mt-3 flex flex-wrap gap-2">
      <button type="button" class="chip min-h-[44px]" @click="cfg = { work: 40, rest: 20, rounds: 8 }">HIIT 40/20×8</button>
      <button type="button" class="chip min-h-[44px]" @click="cfg = { work: 20, rest: 10, rounds: 8 }">Tabata 20/10×8</button>
      <button type="button" class="chip min-h-[44px]" @click="cfg = { work: 0, rest: 90, rounds: 5 }">力量组间 90s</button>
    </div>
    <p class="mt-3 text-xs text-slate-500">动作设 0 = 纯组间休息计时；空格键 开始/暂停。</p>
  </section>

  <section class="card text-center select-none"
           :class="phase === 'work' ? 'ring-1 ring-emerald-500/60' : (phase === 'rest' ? 'ring-1 ring-sky-500/60' : '')">
    <p class="text-sm mb-1"
       :class="phase === 'work' ? 'text-emerald-400' : (phase === 'rest' ? 'text-sky-400' : 'text-slate-500')"
       x-text="phaseLabel()"></p>
    <p class="text-7xl font-bold tabular-nums my-4"
       :class="phase === 'work' ? 'text-emerald-300' : (phase === 'rest' ? 'text-sky-300' : 'text-slate-200')"
       x-text="clock()"></p>
    <p class="text-sm text-slate-400 tabular-nums" x-show="phase !== 'idle'">
      第 <span x-text="round"></span> / <span x-text="cfg.rounds"></span> 组
    </p>

    <div class="mt-5 grid grid-cols-2 gap-2">
      <button type="button" class="btn-primary min-h-[52px] text-lg" x-show="!running && phase !== 'done'"
              @click="start()" x-text="phase === 'idle' ? '开始' : '继续'"></button>
      <button type="button" class="btn-primary min-h-[52px] text-lg" x-show="running" @click="pause()">暂停</button>
      <button type="button" class="chip min-h-[52px] text-base" @click="reset()">重置</button>
    </div>
    <p class="mt-4 text-emerald-400 font-semibold" x-show="phase === 'done'">全部完成 💪</p>
  </section>

  <p class="text-xs text-slate-600 px-1">练完记得回训练页「手动记一笔」（RPE 计入本周负荷）。</p>
</div>

<script>
function workoutTimer() {
  return {
    cfg: { work: 40, rest: 20, rounds: 8 },
    phase: 'idle',   // idle | work | rest | done
    round: 1,
    remaining: 0,
    running: false,
    _timer: null,
    _audio: null,
    _wakeLock: null,

    init() {},

    phaseLabel() {
      if (this.phase === 'work') return '动作 GO';
      if (this.phase === 'rest') return '休息';
      if (this.phase === 'done') return '完成';
      return '准备好了就开始';
    },
    clock() {
      var s = this.phase === 'idle'
        ? (this.cfg.work > 0 ? this.cfg.work : this.cfg.rest)
        : this.remaining;
      var m = Math.floor(s / 60), r = s % 60;
      return (m < 10 ? '0' : '') + m + ':' + (r < 10 ? '0' : '') + r;
    },

    beep(times, freq, dur) {
      try {
        if (!this._audio) this._audio = new (window.AudioContext || window.webkitAudioContext)();
        var ctx = this._audio;
        for (var i = 0; i < times; i++) {
          var osc = ctx.createOscillator(), gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = freq;
          var t0 = ctx.currentTime + i * (dur + 0.12);
          gain.gain.setValueAtTime(0.4, t0);
          gain.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
          osc.start(t0); osc.stop(t0 + dur);
        }
      } catch (e) { /* 无声也能用 */ }
    },

    async acquireWakeLock() {
      try {
        if ('wakeLock' in navigator) this._wakeLock = await navigator.wakeLock.request('screen');
      } catch (e) { /* 不支持就算了 */ }
    },
    releaseWakeLock() {
      if (this._wakeLock) { this._wakeLock.release(); this._wakeLock = null; }
    },

    start() {
      if (this.phase === 'done') return;
      if (this.phase === 'idle') {
        this.cfg.work = Math.max(0, this.cfg.work | 0);
        this.cfg.rest = Math.max(0, this.cfg.rest | 0);
        this.cfg.rounds = Math.min(99, Math.max(1, this.cfg.rounds | 0));
        if (this.cfg.work === 0 && this.cfg.rest === 0) return;
        this.round = 1;
        this.phase = this.cfg.work > 0 ? 'work' : 'rest';
        this.remaining = this.cfg.work > 0 ? this.cfg.work : this.cfg.rest;
        this.beep(1, 880, 0.15);
      }
      this.running = true;
      this.acquireWakeLock();
      var self = this;
      this._timer = setInterval(function () { self.tick(); }, 1000);
    },
    pause() {
      this.running = false;
      clearInterval(this._timer);
      this.releaseWakeLock();
    },
    reset() {
      this.pause();
      this.phase = 'idle';
      this.round = 1;
      this.remaining = 0;
    },
    tick() {
      this.remaining--;
      if (this.remaining === 3 || this.remaining === 2 || this.remaining === 1) {
        this.beep(1, 660, 0.1);   // 最后 3 秒滴答
      }
      if (this.remaining > 0) return;
      // 相位切换
      if (this.phase === 'work' && this.cfg.rest > 0) {
        this.phase = 'rest';
        this.remaining = this.cfg.rest;
        this.beep(2, 520, 0.15);
      } else {
        if (this.round >= this.cfg.rounds) {
          this.phase = 'done';
          this.pause();
          this.beep(3, 880, 0.3);
          return;
        }
        this.round++;
        this.phase = this.cfg.work > 0 ? 'work' : 'rest';
        this.remaining = this.cfg.work > 0 ? this.cfg.work : this.cfg.rest;
        this.beep(1, 880, 0.2);
      }
    }
  };
}
</script>
{% endblock %}
