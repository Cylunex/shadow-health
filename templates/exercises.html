{% extends "base.html" %}
{% block page_title %}动作库{% endblock %}
{% block content %}
<div class="space-y-4">

  {# 分类筛选 chips：HTMX 局部替换列表 #}
  <div class="flex gap-2 overflow-x-auto scrollbar-none -mx-4 px-4 pb-1">
    <a href="{{ u('/workout/exercises') }}"
       hx-get="{{ u('/workout/exercises') }}" hx-target="#exercises-list" hx-swap="outerHTML" hx-push-url="true"
       class="chip shrink-0 min-h-[44px] whitespace-nowrap {% if not cat %}chip-active{% endif %}">全部</a>
    {% for name in categories %}
    <a href="{{ u('/workout/exercises') }}?c={{ name }}"
       hx-get="{{ u('/workout/exercises') }}?c={{ name }}" hx-target="#exercises-list" hx-swap="outerHTML" hx-push-url="true"
       class="chip shrink-0 min-h-[44px] whitespace-nowrap {% if cat == name %}chip-active{% endif %}">{{ name }}</a>
    {% endfor %}
  </div>

  {% include "fragments/exercises_list.html" %}

  <p class="text-xs text-slate-600 px-1">Lv 数字为同一进阶链内的难度层级：当前动作能标准完成 3 组 × 12 再升级下一层。</p>
</div>
{% endblock %}
